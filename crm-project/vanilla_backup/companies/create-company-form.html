<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create Company | SalesNest - Enterprise-grade company profiling form.">
  <title>Create Company | SalesNest</title>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Shared CSS stylesheet -->
  <link rel="stylesheet" href="../shared/shared.css">
</head>
<body>

  <div class="crm-layout">
    
    <!-- DYNAMIC SIDEBAR (Rendered by shared.js) -->
    <div id="sidebar-placeholder"></div>

    <main class="crm-main">
      
      <!-- DYNAMIC NAVBAR (Rendered by shared.js) -->
      <div id="navbar-placeholder"></div>

      <!-- MAIN CONTENT -->
      <section class="crm-content">
        
        <div class="create-lead-container">
          
          <!-- Navigation header bar -->
          <div style="margin-bottom: 24px; display: flex; align-items: center; gap: 16px;">
            <a href="companies-dashboard.html" class="back-btn" title="Back to Dashboard">
              <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div>
              <h2 style="font-weight: 700; font-size: 20px; letter-spacing: -0.02em;">Create New Company Profile</h2>
              <p style="font-size: 13px; color: var(--text-secondary);">Fill in the operational, industry, and location details.</p>
            </div>
          </div>

          <!-- Card form -->
          <div class="card">
            <form id="standalone-create-company-form" style="margin: 0;">
              <div class="card-body" style="padding: 28px;">
                <div class="form-grid">
                  
                  <div class="form-group form-full-width">
                    <label for="form-name">Company Name<span>*</span></label>
                    <input type="text" id="form-name" class="form-control" placeholder="e.g. TechNova" required>
                  </div>
                  
                  <div class="form-group">
                    <label for="form-code">Company Code</label>
                    <input type="text" id="form-code" class="form-control" placeholder="e.g. TN001 (auto-generated if empty)">
                  </div>
                  
                  <div class="form-group">
                    <label for="form-industry">Industry</label>
                    <input type="text" id="form-industry" class="form-control" placeholder="e.g. Software, Consulting">
                  </div>
                  
                  <div class="form-group">
                    <label for="form-website">Website</label>
                    <input type="url" id="form-website" class="form-control" placeholder="e.g. https://technova.com">
                  </div>
                  
                  <div class="form-group">
                    <label for="form-revenue">Annual Revenue (₹)</label>
                    <input type="number" id="form-revenue" class="form-control" placeholder="e.g. 120000000" min="0" step="10000">
                  </div>
                  
                  <div class="form-group">
                    <label for="form-city">City</label>
                    <input type="text" id="form-city" class="form-control" placeholder="e.g. Bangalore">
                  </div>
                  
                  <div class="form-group">
                    <label for="form-state">State</label>
                    <input type="text" id="form-state" class="form-control" placeholder="e.g. Karnataka">
                  </div>
                  
                  <div class="form-group">
                    <label for="form-country">Country</label>
                    <input type="text" id="form-country" class="form-control" placeholder="e.g. India">
                  </div>
                  
                  <div class="form-group form-full-width">
                    <label for="form-notes">Notes</label>
                    <textarea id="form-notes" class="form-control" rows="4" placeholder="Enter background details, descriptions, or next steps..."></textarea>
                  </div>
                  
                </div>
              </div>
              
              <!-- Sticky action footer -->
              <div style="padding: 18px 28px; border-top: 1px solid var(--border-color); background-color: hsl(210, 40%, 99%); display: flex; justify-content: flex-end; gap: 12px;">
                <button type="button" class="btn btn-secondary" id="btn-cancel-create">Cancel</button>
                <button type="submit" class="btn btn-primary">Create Company</button>
              </div>
            </form>
          </div>

        </div>

      </section>
    </main>
  </div>

  <!-- Scripts -->
  <script src="../shared/shared.js"></script>
  <script src="companies.js"></script>
</body>
</html>
